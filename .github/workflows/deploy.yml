name: Deploy to GitHub Pages

on:
  push:
    branches: [new-start]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v4
      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
      - name: Install pnpm
        run: npm install -g pnpm
      - name: Install dependencies
        run: pnpm install
      - name: Build the site
        run: pnpm run build
      - name: List files in root for debugging
        run: ls -la
      - name: List files in dist for debugging
        run: ls -la dist
      - name: Upload artifacts for deployment
        uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v4
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: github-pages
      - name: List files for debugging after download
        run: ls -la dist
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
